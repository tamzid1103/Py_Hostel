<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA_Home Login</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme-preference');
                var theme = (savedTheme === 'dark' || savedTheme === 'light')
                    ? savedTheme
                    : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.style.colorScheme = theme;
            } catch (error) {
                // Ignore storage errors and keep default theme.
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">
    <button type="button" class="theme-toggle auth-theme-toggle" data-theme-toggle aria-label="Switch theme">
        <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
    </button>

    <div class="login-container">
        <h2>Welcome to NASA_Home</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flashes">
            {% for category, message in messages %}
            <li class="flash {{ category if category else 'info' }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="user@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="mt-3" style="margin-top:20px;">Don't have an account? <a href="{{ url_for('register') }}">Register
                here</a></p>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>

</html>
