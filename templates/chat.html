{% extends base_template %}

{% block title %}Messages{% endblock %}

{% block content %}
<style>
    .chat-container {
        display: flex;
        height: 75vh;
        border: var(--glass-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--bg-card);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        box-shadow: var(--shadow-md);
    }

    .contacts {
        width: 30%;
        border-right: 1px solid var(--border-color);
        background: rgba(0, 0, 0, 0.05);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .contact-item {
        padding: 15px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
    }

    .contact-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .contact-item.active {
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        color: white;
        border-bottom: none;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
    }

    .chat-area {
        width: 70%;
        display: flex;
        flex-direction: column;
    }

    .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.02);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .messages::-webkit-scrollbar {
        width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
    }

    .message {
        padding: 10px 15px;
        border-radius: 15px;
        max-width: 70%;
        word-wrap: break-word;
    }

    .message.sent {
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
    }

    .message.received {
        background: rgba(255, 255, 255, 0.15);
        color: var(--text-main);
        align-self: flex-start;
        border-bottom-left-radius: 2px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .msg-time {
        font-size: 10px;
        opacity: 0.8;
        text-align: right;
        margin-top: 5px;
        display: block;
    }

    .chat-input {
        padding: 15px;
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 10px;
        background: rgba(0, 0, 0, 0.1);
    }

    .chat-input input {
        flex: 1;
        padding: 12px 20px;
        border: 1px solid var(--border-color);
        border-radius: 20px;
        outline: none;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        font-family: inherit;
    }

    .chat-input input::placeholder {
        color: var(--text-muted);
    }

    .chat-input button {
        padding: 10px 24px;
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        transition: var(--transition);
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
    }

    .chat-input button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
    }

    @media screen and (max-width: 768px) {
        .chat-container {
            flex-direction: column;
            height: 75vh;
        }

        .contacts {
            width: 100%;
            height: 35%;
            border-right: none;
            border-bottom: 1px solid #ddd;
        }

        .chat-area {
            width: 100%;
            height: 65%;
        }

        .message {
            max-width: 85%;
        }

        .contacts {
            border-right: none;
            border-bottom: 1px solid var(--border-color);
        }
    }
</style>

<div class="chat-container" id="chat-container" data-current-user-id="{{ session['user_id'] }}">
    <div class="contacts">
        <div
            style="padding: 20px 15px; margin: 0; border-bottom: 1px solid var(--border-color); font-weight: bold; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 10px;">
            <div style="width:8px; height:8px; background:var(--primary); border-radius:50%;"></div> Contacts
        </div>
        {% for c in contacts %}
        <div class="contact-item" data-id="{{ c.id }}" data-name="{{ c.name|e }}">
            <strong style="color: inherit; display: block; font-size: 15px;">{{ c.name }}</strong>
            <div style="font-size: 12px; opacity: 0.8; margin-top: 4px; color: inherit;">{{ c.info }}</div>
        </div>
        {% else %}
        <div style="padding: 15px; text-align: center; color: #777;">No contacts available.</div>
        {% endfor %}
    </div>

    <div class="chat-area">
        <div
            style="padding: 20px 25px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.05); color: var(--text-main); display: flex; align-items: center; gap: 10px;">
            <div style="width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:bold;"
                id="chat-avatar">#</div>
            <strong id="chat-header">Select a contact to start messaging</strong>
        </div>

        <div class="messages" id="messages-box">
            <!-- Messages load here -->
        </div>

        <div class="chat-input" id="chat-input" style="display: none;">
            <input type="text" id="msg-text" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const chatContainer = document.getElementById('chat-container');
    const currentUserId = Number((chatContainer && chatContainer.dataset.currentUserId) || 0);
    let activeReceiverId = null;

    socket.on('connect', () => {
        socket.emit('join', {});
    });

    socket.on('receive_message', (data) => {
        // Only append if it's related to the currently active chat
        if ((data.sender_id === activeReceiverId && data.receiver_id === currentUserId) ||
            (data.sender_id === currentUserId && data.receiver_id === activeReceiverId)) {
            appendMessage(data);
        }
    });

    document.querySelectorAll('.contact-item').forEach((item) => {
        item.addEventListener('click', () => {
            const id = Number(item.dataset.id);
            const name = item.dataset.name || 'Unknown';
            selectContact(id, name, item);
        });
    });

    function selectContact(id, name, el) {
        activeReceiverId = id;
        document.getElementById('chat-header').innerText = "Chat with " + name;
        const avatar = document.getElementById('chat-avatar');
        if (avatar) avatar.innerText = name.charAt(0).toUpperCase();
        avatar.style.background = 'linear-gradient(135deg, var(--primary), #3b82f6)';
        document.getElementById('chat-input').style.display = 'flex';

        // highlight active
        document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        // Load history
        fetch(`/api/chat/${id}`)
            .then(res => res.json())
            .then(messages => {
                const box = document.getElementById('messages-box');
                box.innerHTML = '';
                messages.forEach(appendMessage);
                scrollToBottom();
            });
    }

    function appendMessage(msg) {
        const box = document.getElementById('messages-box');
        const div = document.createElement('div');
        div.className = 'message ' + (msg.sender_id === currentUserId ? 'sent' : 'received');

        div.innerHTML = `
            ${msg.message}
            <span class="msg-time">${msg.sent_at}</span>
        `;
        box.appendChild(div);
        scrollToBottom();
    }

    function sendMessage() {
        const input = document.getElementById('msg-text');
        const text = input.value.trim();
        if (text && activeReceiverId) {
            socket.emit('send_message', {
                receiver_id: activeReceiverId,
                message: text
            });
            input.value = '';
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function scrollToBottom() {
        const box = document.getElementById('messages-box');
        box.scrollTop = box.scrollHeight;
    }
</script>
{% endblock %}
