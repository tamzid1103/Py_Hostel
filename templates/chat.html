{% extends base_template %}

{% block title %}Messages{% endblock %}

{% block content %}
<style>
    .chat-container {
        display: flex;
        height: 75vh;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
    }

    .contacts {
        width: 30%;
        border-right: 1px solid #ddd;
        background: #f9f9f9;
        overflow-y: auto;
    }

    .contact-item {
        padding: 15px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: background 0.3s;
    }

    .contact-item:hover {
        background: #e0e0e0;
    }

    .contact-item.active {
        background: #3498db;
        color: white;
    }

    .chat-area {
        width: 70%;
        display: flex;
        flex-direction: column;
    }

    .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        padding: 10px 15px;
        border-radius: 15px;
        max-width: 70%;
        word-wrap: break-word;
    }

    .message.sent {
        background: #3498db;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
    }

    .message.received {
        background: #ecf0f1;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 2px;
    }

    .msg-time {
        font-size: 10px;
        opacity: 0.8;
        text-align: right;
        margin-top: 5px;
        display: block;
    }

    .chat-input {
        padding: 15px;
        border-top: 1px solid #ddd;
        display: flex;
        gap: 10px;
        background: white;
    }

    .chat-input input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 20px;
        outline: none;
    }

    .chat-input button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
    }

    @media screen and (max-width: 768px) {
        .chat-container {
            flex-direction: column;
            height: 75vh;
        }

        .contacts {
            width: 100%;
            height: 35%;
            border-right: none;
            border-bottom: 1px solid #ddd;
        }

        .chat-area {
            width: 100%;
            height: 65%;
        }

        .message {
            max-width: 85%;
        }
    }
</style>

<div class="chat-container">
    <div class="contacts">
        <h3 style="padding: 15px; margin: 0; background: #2c3e50; color: white;">Contacts</h3>
        {% for c in contacts %}
        <div class="contact-item" data-id="{{ c.id }}" onclick="selectContact({{ c.id }}, '{{ c.name }}', this)">
            <strong>{{ c.name }}</strong>
            <div style="font-size: 12px; opacity: 0.8;">{{ c.info }}</div>
        </div>
        {% else %}
        <div style="padding: 15px; text-align: center; color: #777;">No contacts available.</div>
        {% endfor %}
    </div>

    <div class="chat-area">
        <div style="padding: 15px; background: #ecf0f1; border-bottom: 1px solid #ddd;">
            <strong id="chat-header">Select a contact to start messaging</strong>
        </div>

        <div class="messages" id="messages-box">
            <!-- Messages load here -->
        </div>

        <div class="chat-input" id="chat-input" style="display: none;">
            <input type="text" id="msg-text" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const currentUserId = {{ session['user_id'] }};
    let activeReceiverId = null;

    socket.on('connect', () => {
        socket.emit('join', {});
    });

    socket.on('receive_message', (data) => {
        // Only append if it's related to the currently active chat
        if ((data.sender_id === activeReceiverId && data.receiver_id === currentUserId) ||
            (data.sender_id === currentUserId && data.receiver_id === activeReceiverId)) {
            appendMessage(data);
        }
    });

    function selectContact(id, name, el) {
        activeReceiverId = id;
        document.getElementById('chat-header').innerText = "Chat with " + name;
        document.getElementById('chat-input').style.display = 'flex';

        // highlight active
        document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        // Load history
        fetch(`/api/chat/${id}`)
            .then(res => res.json())
            .then(messages => {
                const box = document.getElementById('messages-box');
                box.innerHTML = '';
                messages.forEach(appendMessage);
                scrollToBottom();
            });
    }

    function appendMessage(msg) {
        const box = document.getElementById('messages-box');
        const div = document.createElement('div');
        div.className = 'message ' + (msg.sender_id === currentUserId ? 'sent' : 'received');

        div.innerHTML = `
            ${msg.message}
            <span class="msg-time">${msg.sent_at}</span>
        `;
        box.appendChild(div);
        scrollToBottom();
    }

    function sendMessage() {
        const input = document.getElementById('msg-text');
        const text = input.value.trim();
        if (text && activeReceiverId) {
            socket.emit('send_message', {
                receiver_id: activeReceiverId,
                message: text
            });
            input.value = '';
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function scrollToBottom() {
        const box = document.getElementById('messages-box');
        box.scrollTop = box.scrollHeight;
    }
</script>
{% endblock %}
